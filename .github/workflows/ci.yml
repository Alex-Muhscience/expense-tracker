name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
    - name: Lint
      run: |
        cd backend
        flake8 app.py --max-line-length=120
    - name: Run tests
      run: |
        cd backend
        python -m pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install dependencies
      run: |
        cd client
        npm install
    - name: Lint
      run: |
        cd client
        npm run lint
    - name: Build
      run: |
        cd client
        npm run build
    - name: Run tests
      run: |
        cd client
        npm test -- --watchAll=false --passWithNoTests
